summary: >-
  Naoero, officially the Republic of Naoero and formerly known as Nauru and as Pleasant
  Island, is an island country and microstate in Micronesia, part of Oceania in the
  Central Pacific. Its nearest neighbour is Banaba of Kiribati, about 300 km to the
  east. On 26 June 2026, it notified the United Nations that it had changed its name
  to the Republic of Naoero.
