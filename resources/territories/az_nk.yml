summary: >-
  Nagorno-Karabakh is a region located in the South Caucasus, covering the southeastern
  stretch of the Lesser Caucasus mountain range. Long disputed between Armenia and
  Azerbaijan, the self-declared Republic of Artsakh was dissolved on 1 January 2024
  after Azerbaijan took control of the territory in September 2023.
